<style>
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: border-color 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-bottom-color: #adc6ff; /* primary */
        }
        
        /* Floating label styles */
        .input-group {
            position: relative;
            margin-bottom: 32px;
        }
        
        .input-label {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            transition: 0.2s ease all;
            color: var(--color-on-surface-variant, #c2c6d6);
        }
        
        .glass-input:focus ~ .input-label,
        .glass-input:not(:placeholder-shown) ~ .input-label {
            top: -20px;
            font-size: 12px;
            color: #adc6ff;
        }
    </style>

<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden selection:bg-primary/30 selection:text-primary">
<!-- Immersive Shader Background -->

<!-- Main Content Container with Parallax Depth -->
<div class="relative z-10 flex flex-col min-h-screen max-w-[1200px] mx-auto px-container-margin py-md" style="transform: translateZ(0);">
<!-- TopAppBar (Transactional Override - Back Button Only) -->
<header class="flex items-center justify-between w-full mb-xl">
<button aria-label="Go back" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white/10 transition-colors text-on-surface hover:opacity-80 scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md tracking-tighter text-on-surface opacity-50">FocusFlip</div>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<!-- Sign In Card -->
<main class="flex-1 flex flex-col justify-center items-center w-full max-w-md mx-auto">
<div class="w-full mb-lg text-center md:text-left">
<h1 class="font-display text-display text-on-surface mb-base md:hidden font-headline-lg-mobile text-headline-lg-mobile">Welcome Back</h1>
<h1 class="font-display text-display text-on-surface mb-base hidden md:block">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Continue your focus journey.</p>
</div>
<div class="w-full glass-panel rounded-xl p-md md:p-lg shadow-[0px_20px_40px_rgba(0,0,0,0.5)]">
<form class="flex flex-col w-full" id="signin-form">
<div class="input-group">
<input autocomplete="email" class="glass-input w-full py-2 font-body-md text-body-md text-on-surface" id="email" placeholder=" " required="" type="email"/>
<label class="input-label font-body-md text-body-md" for="email">Email Address</label>
</div>
<div class="input-group mb-sm">
<input autocomplete="current-password" class="glass-input w-full py-2 font-body-md text-body-md text-on-surface pr-10" id="password" placeholder=" " required="" type="password"/>
<label class="input-label font-body-md text-body-md" for="password">Password</label>
<button aria-label="Toggle password visibility" class="absolute right-0 top-2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end mb-lg">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full h-[56px] bg-on-surface text-surface font-label-md text-label-md rounded-lg flex items-center justify-center hover:opacity-90 transition-opacity mb-md" type="submit">
                        SIGN IN
                    </button>
</form>

<div class="h-px bg-white/10 flex-1"></div>
</div>
