<style>
        body {
            background-color: #000000;
            color: #e2e2e2;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            animation: expandIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes expandIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .breathe-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 3D Digit Breathing Float & Glow */
        @keyframes digitFloat {
            0%, 100% { 
                transform: translateY(0); 
                text-shadow: 0 4px 24px rgba(0,0,0,0.8);
            }
            50% { 
                transform: translateY(-8px); 
                text-shadow: 0 12px 32px rgba(173,198,255,0.15);
            }
        }

        .digit-float-1 { animation: digitFloat 6s ease-in-out infinite; }
        .digit-float-2 { animation: digitFloat 6s ease-in-out infinite -2s; }
        .digit-float-3 { animation: digitFloat 6s ease-in-out infinite -4s; }

        /* Metadata Fade In */
        @keyframes slowFadeIn {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .metadata-fade {
            opacity: 0;
            animation: slowFadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
        }

        .controls-transition {
            transition: opacity 0.5s ease-in-out, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls-hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .controls-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Glassmorphism utility for controls */
        .glass-pill {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Large minimalist digits */
        .digit-display {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="h-screen w-screen flex flex-col items-center justify-between relative" id="main-container">
<!-- Top Spacer -->
<div class="mt-12 md:mt-16 w-full"></div>
<!-- Center 3D Scene + Overlay Digits -->
<div class="relative flex-1 w-full max-w-sm mx-auto flex flex-col items-center justify-center my-8 z-0">
<!-- 3D Animation Background -->
<!-- HTML Overlay Digits positioned over the 3D blocks -->
<div class="relative z-10 flex flex-col items-center justify-center h-full py-12 w-full gap-2">
<!-- Hours -->
<div class="flex items-center justify-center w-full">
<span class="font-display text-[96px] md:text-[120px] font-bold text-on-surface leading-none digit-display digit-float-1">
                    00
                </span>
</div>
<!-- Minutes -->
<div class="flex items-center justify-center w-full">
<span class="font-display text-[96px] md:text-[120px] font-bold text-on-surface leading-none digit-display digit-float-2">
                    24
                </span>
</div>
<!-- Seconds -->
<div class="flex items-center justify-center w-full">
<span class="font-display text-[96px] md:text-[120px] font-bold text-outline leading-none digit-display digit-float-3">
                    18
                </span>
</div>
</div>
</div>
<!-- Bottom Controls & Footnote -->
<div class="mb-12 md:mb-16 flex flex-col items-center gap-6 w-full z-10 px-container-margin metadata-fade">
<!-- Floating Controls Pill -->
<div class="glass-pill rounded-full px-8 py-4 flex items-center gap-8 controls-transition controls-hidden" id="controls-pill">
<button class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[28px] text-on-surface" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<div class="w-px h-8 bg-white/10"></div>
<button class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[28px] text-error" style="font-variation-settings: 'FILL' 1;">stop</span>
</button>
</div>
<!-- Bottom Status (Breathing) -->
<div class="flex items-center gap-2 z-10 breathe-animation">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(173,198,255,0.8)]"></span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-[0.1em]">Deep Coding • 45%</span>
</div>
<!-- Footnote -->
<div class="font-label-sm text-label-sm text-on-surface-variant opacity-50 tracking-[0.1em]">
            TODAY 5h 42m
        </div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('main-container');
            const controlsPill = document.getElementById('controls-pill');
            let hideTimeout;
            let lastTap = 0;
            let pressTimer;

            // Trigger initial auto-hide if controls start visible (optional)
            
            const showControls = () => {
                controlsPill.classList.remove('controls-hidden');
                controlsPill.classList.add('controls-visible');
                
                clearTimeout(hideTimeout);
                hideTimeout = setTimeout(() => {
                    controlsPill.classList.remove('controls-visible');
                    controlsPill.classList.add('controls-hidden');
                }, 2000);
            };

            // Initial brief show to indicate controls exist
            setTimeout(() => {
                showControls();
            }, 1000);

            // Interaction Logic
            container.addEventListener('touchstart', (e) => {
                // Prevent default to avoid selection/magnifier on long press
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SPAN') {
                    e.preventDefault();
                }

                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                // Double tap detection
                if (tapLength < 300 && tapLength > 0) {
                    console.log('Double tap: Paused');
                    // Add pause visual feedback here if needed
                    clearTimeout(pressTimer);
                    e.preventDefault();
                } else {
                    // Single tap show controls
                    showControls();
                    
                    // Long press detection
                    pressTimer = setTimeout(() => {
                        console.log('Long press: Finished');
                        // Add finish visual feedback here if needed
                        controlsPill.classList.remove('controls-hidden');
                        controlsPill.classList.add('controls-visible');
                    }, 800); // 800ms for long press
                }
                lastTap = currentTime;
            }, { passive: false });

            container.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
            });
            
            // Mouse equivalents for testing on desktop
            container.addEventListener('mousedown', (e) => {
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SPAN') {
                    e.preventDefault();
                }
                showControls();
            });
        });
    </script>
</body></html>
